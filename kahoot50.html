<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kahoot — Pasado Simple (50 preguntas)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1730; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .wrap { width: 100%; max-width: 700px; }
  .header { background: #534AB7; border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
  .header-left h1 { font-size: 20px; font-weight: 700; color: #fff; }
  .header-left p { font-size: 12px; color: #AFA9EC; margin-top: 2px; }
  .score-big { font-size: 26px; font-weight: 700; color: #fff; text-align: right; }
  .score-lbl { font-size: 11px; color: #AFA9EC; text-align: right; }
  .progress-wrap { background: #2e2a50; border-radius: 99px; height: 7px; margin-bottom: 1rem; }
  .progress-fill { height: 7px; border-radius: 99px; background: #9FE1CB; transition: width 0.4s; }
  .q-card { background: #534AB7; border-radius: 16px; padding: 1.5rem; }
  .q-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .q-num { font-size: 13px; color: #AFA9EC; font-weight: 500; }
  .level-badge { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 99px; }
  .easy { background: #EAF3DE; color: #27500A; }
  .hard { background: #FAECE7; color: #712B13; }
  .q-text { font-size: 22px; font-weight: 700; color: #fff; text-align: center; line-height: 1.5; min-height: 70px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .opt { border: none; border-radius: 12px; padding: 16px 14px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #fff; transition: transform 0.1s; text-align: left; }
  .opt:hover:not(:disabled) { transform: scale(1.02); }
  .opt:active { transform: scale(0.97); }
  .opt:disabled { cursor: default; }
  .opt-a { background: #E55A5A; }
  .opt-b { background: #1D9E75; }
  .opt-c { background: #EF9F27; }
  .opt-d { background: #378ADD; }
  .badge { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .opt.correct { background: #27500A !important; outline: 3px solid #97C459; }
  .opt.wrong   { background: #791F1F !important; outline: 3px solid #F09595; opacity: 0.75; }
  .opt.reveal  { outline: 3px solid #97C459; }
  .feedback { border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; text-align: center; margin-top: 14px; display: none; }
  .feedback.ok   { background: #EAF3DE; color: #27500A; display: block; }
  .feedback.fail { background: #FCEBEB; color: #791F1F; display: block; }
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .btn { background: rgba(255,255,255,0.15); border: none; border-radius: 10px; padding: 10px 22px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn:hover { background: rgba(255,255,255,0.28); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn-next { display: none; }
  .results { background: #534AB7; border-radius: 16px; padding: 3rem 2rem; text-align: center; }
  .res-big { font-size: 72px; font-weight: 700; color: #fff; }
  .res-sub { font-size: 16px; color: #AFA9EC; margin-top: 6px; }
  .res-msg { font-size: 18px; color: #fff; margin-top: 1.5rem; line-height: 1.6; }
  .btn-restart { background: #fff; color: #534AB7; border: none; border-radius: 12px; padding: 14px 32px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 2rem; }
  .btn-restart:hover { background: #EEEDFE; }
  @media (max-width: 500px) {
    .opts { grid-template-columns: 1fr; }
    .q-text { font-size: 18px; }
    .q-card { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-left">
      <h1>Kahoot — Pasado Simple</h1>
      <p>50 preguntas · Simple Past Tense</p>
    </div>
    <div>
      <div class="score-big" id="score-display">0</div>
      <div class="score-lbl">puntos</div>
    </div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div id="app"></div>
</div>

<script>
const qs = [
  {q:"What is the past simple of 'go'?", opts:["goed","went","gone","goes"], ans:1, lvl:"easy"},
  {q:"What is the past simple of 'eat'?", opts:["eated","eat","ate","eaten"], ans:2, lvl:"easy"},
  {q:"What is the past simple of 'play'?", opts:["plaied","played","play","playes"], ans:1, lvl:"easy"},
  {q:"What is the past simple of 'have'?", opts:["haved","has","have","had"], ans:3, lvl:"easy"},
  {q:"What is the past simple of 'watch'?", opts:["watched","watcht","watchd","wached"], ans:0, lvl:"easy"},
  {q:"What is the past simple of 'see'?", opts:["seed","seen","saw","sees"], ans:2, lvl:"easy"},
  {q:"What is the past simple of 'run'?", opts:["runned","runed","ran","ranned"], ans:2, lvl:"easy"},
  {q:"She ___ to school yesterday.", opts:["go","goes","went","gone"], ans:2, lvl:"easy"},
  {q:"They ___ soccer last weekend.", opts:["play","played","plaied","plays"], ans:1, lvl:"easy"},
  {q:"I ___ very happy at the party.", opts:["am","were","be","was"], ans:3, lvl:"easy"},
  {q:"She didn't ___ to the party.", opts:["went","go","gone","goes"], ans:1, lvl:"hard"},
  {q:"___ he call you yesterday?", opts:["Was","Does","Did","Were"], ans:2, lvl:"hard"},
  {q:"What is the past simple of 'buy'?", opts:["buyed","boughted","bought","buyied"], ans:2, lvl:"hard"},
  {q:"What is the past simple of 'take'?", opts:["taked","tooked","taken","took"], ans:3, lvl:"hard"},
  {q:"They ___ not at home last night.", opts:["wasn't","aren't","weren't","isn't"], ans:2, lvl:"hard"},
  {q:"What is the past simple of 'think'?", opts:["thinked","thought","thunk","thinks"], ans:1, lvl:"hard"},
  {q:"I ___ a great book last week.", opts:["readed","red","reads","read"], ans:3, lvl:"hard"},
  {q:"What is the past simple of 'put'?", opts:["putted","puts","put","puted"], ans:2, lvl:"hard"},
  {q:"Did they ___ the game?", opts:["won","wins","winning","win"], ans:3, lvl:"hard"},
  {q:"What is the past simple of 'spend'?", opts:["spended","spendt","spend","spent"], ans:3, lvl:"hard"},
  {q:"He ___ his keys on the table.", opts:["putted","put","puts","puted"], ans:1, lvl:"hard"},
  {q:"What is the past simple of 'feel'?", opts:["feeled","felt","felled","feels"], ans:1, lvl:"hard"},
  {q:"We ___ a lot of money on that trip.", opts:["spended","spend","spendt","spent"], ans:3, lvl:"hard"},
  {q:"What is the past simple of 'know'?", opts:["knowed","known","knew","knows"], ans:2, lvl:"hard"},
  {q:"She ___ her phone and ___ a photo.", opts:["took/taked","take/took","took/took","taked/took"], ans:2, lvl:"hard"},
  {q:"What is the past simple of 'give'?", opts:["gived","gave","given","gives"], ans:1, lvl:"hard"},
  {q:"___ you tired after the game?", opts:["Did","Was","Are","Were"], ans:3, lvl:"hard"},
  {q:"What is the past simple of 'wear'?", opts:["weared","worn","wore","wears"], ans:2, lvl:"hard"},
  {q:"He ___ the answer but didn't say it.", opts:["knowed","known","knows","knew"], ans:3, lvl:"hard"},
  {q:"What is the past simple of 'lose'?", opts:["losed","lost","losted","loses"], ans:1, lvl:"hard"},
  {q:"They ___ the match 3-0.", opts:["losed","lose","lost","losted"], ans:2, lvl:"hard"},
  {q:"What is the past simple of 'bring'?", opts:["bringed","brung","brought","brings"], ans:2, lvl:"hard"},
  {q:"She ___ her friends to the party.", opts:["bringed","brought","brung","brings"], ans:1, lvl:"hard"},
  {q:"What is the past simple of 'catch'?", opts:["catched","cought","caught","catchd"], ans:2, lvl:"hard"},
  {q:"He ___ the ball and scored.", opts:["catched","caught","cought","catchd"], ans:1, lvl:"hard"},
  {q:"What is the past simple of 'teach'?", opts:["teached","tought","taught","teachd"], ans:2, lvl:"hard"},
  {q:"My teacher ___ us about history.", opts:["teached","tought","taught","teachd"], ans:2, lvl:"hard"},
  {q:"What is the past simple of 'build'?", opts:["builded","built","builed","builds"], ans:1, lvl:"hard"},
  {q:"They ___ the house in 3 months.", opts:["builded","builed","builds","built"], ans:3, lvl:"hard"},
  {q:"What is the past simple of 'cut'?", opts:["cutted","cuted","cuts","cut"], ans:3, lvl:"hard"},
  {q:"She ___ the paper with scissors.", opts:["cutted","cuted","cut","cuts"], ans:2, lvl:"hard"},
  {q:"What is the past simple of 'find'?", opts:["finded","founded","found","finds"], ans:2, lvl:"hard"},
  {q:"I ___ my keys under the sofa.", opts:["finded","founded","finds","found"], ans:3, lvl:"hard"},
  {q:"What is the past simple of 'leave'?", opts:["leaved","left","lefted","leaves"], ans:1, lvl:"hard"},
  {q:"He ___ the office at 6 pm.", opts:["leaved","lefted","leaves","left"], ans:3, lvl:"hard"},
  {q:"What is the past simple of 'meet'?", opts:["meeted","meted","met","meets"], ans:2, lvl:"hard"},
  {q:"We ___ for the first time in Paris.", opts:["meeted","meted","meets","met"], ans:3, lvl:"hard"},
  {q:"What is the past simple of 'write'?", opts:["writed","written","wrote","writes"], ans:2, lvl:"hard"},
  {q:"She ___ him a long letter.", opts:["writed","written","writes","wrote"], ans:3, lvl:"hard"},
  {q:"Choose the only CORRECT past simple sentence:", opts:["He runned fast.","She didn't went.","They were at home.","I didn't ate."], ans:2, lvl:"hard"},
];

const colors = ['opt-a','opt-b','opt-c','opt-d'];
const labels = ['A','B','C','D'];
let cur = 0, score = 0, answered = false;

function render() {
  if (cur >= qs.length) { renderResults(); return; }
  const q = qs[cur];
  answered = false;
  document.getElementById('pbar').style.width = Math.round((cur/qs.length)*100) + '%';
  document.getElementById('score-display').textContent = score;
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-top">
        <span class="q-num">Pregunta ${cur+1} de ${qs.length}</span>
        <span class="level-badge ${q.lvl}">${q.lvl === 'easy' ? 'Facil' : 'Dificil'}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="opts">
        ${q.opts.map((o,i)=>`
          <button class="opt ${colors[i]}" id="opt${i}" onclick="pick(${i})">
            <span class="badge">${labels[i]}</span>
            <span>${o}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="fb"></div>
      <div class="nav">
        <button class="btn" onclick="prev()" ${cur===0?'disabled':''}>&#8592; Anterior</button>
        <button class="btn btn-next" id="btn-next" onclick="next()">Siguiente &#8594;</button>
      </div>
    </div>
  `;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = qs[cur];
  for (let j = 0; j < 4; j++) {
    const b = document.getElementById('opt'+j);
    b.disabled = true;
    if (j === q.ans) b.classList.add(i === q.ans ? 'correct' : 'reveal');
  }
  const fb = document.getElementById('fb');
  document.getElementById('btn-next').style.display = 'block';
  if (i === q.ans) {
    score++;
    document.getElementById('score-display').textContent = score;
    document.getElementById('opt'+i).classList.add('correct');
    fb.textContent = '¡Correcto!';
    fb.className = 'feedback ok';
  } else {
    document.getElementById('opt'+i).classList.add('wrong');
    fb.textContent = 'Incorrecto. Correcta: ' + labels[q.ans] + ') ' + q.opts[q.ans];
    fb.className = 'feedback fail';
  }
}

function next() { cur++; render(); }
function prev() { if (cur > 0) { cur--; render(); } }

function renderResults() {
  document.getElementById('pbar').style.width = '100%';
  document.getElementById('score-display').textContent = score;
  const pct = Math.round((score / qs.length) * 100);
  const msg = pct >= 80 ? '¡Excelente! Dominas el pasado simple.' :
              pct >= 60 ? 'Buen trabajo, sigue practicando.' :
              pct >= 40 ? 'Va bien, pero repasa los verbos irregulares.' :
              'Dedica mas tiempo a los verbos irregulares.';
  document.getElementById('app').innerHTML = `
    <div class="results">
      <div class="res-big">${score}/${qs.length}</div>
      <div class="res-sub">${pct}% correcto</div>
      <div class="res-msg">${msg}</div>
      <button class="btn-restart" onclick="restart()">Jugar de nuevo</button>
    </div>
  `;
}

function restart() { cur = 0; score = 0; answered = false; render(); }
render();
</script>
</body>
</html>
